services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: prosig
      POSTGRES_USER: prosig
      POSTGRES_PASSWORD: prosig_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prosig"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
